<!DOCTYPE html>
<html lang="en-US">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/x-icon" href="https://openlayers.org/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Magnum P.I. Map</title>
  <script src="https://kit.fontawesome.com/0d646bf8f0.js" crossorigin="anonymous"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script type="module" src="./main.js"></script>
  <script src="js/base.js"></script>
</head>

<body>
  <div class="banner">
    <img class="logo" src="magnump.i._map_logo.png" alt="Magnum P.I. Map Logo" width="1189" height="110">
  </div>
  <i class="fa-solid fa-circle-info credits"></i>
  <div class="credits-overlay"></div>
  
  <div class="credits-box">
    <div class="credits-head">
      <span class="credits-bold"><b>Credits</b></span>
      <i class="fa-solid fa-circle-xmark close-credits" style="float: right;"></i>
    </div>
    <p>All the Magnum P.I. television series referenced here on this map are copyrighted.
      You can view the source code for this map <a href="https://github.com/evanalba/magnump.i.map">here</a>.
      Also, I would like to give credit to <a href="https://magnum-mania.com/">Magnum Mania</a> for providing me the
      locations of Magnum P.I..
    </p>
  </div>
  <div id="map"></div>
</body>

</html>
